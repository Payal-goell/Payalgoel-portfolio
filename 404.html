<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Payal Goel | Portfolio</title>
    <script>
      // GitHub Pages SPA redirect for 404
      var pathSegments = location.pathname.split("/").filter((p) => p !== "Payalgoel-portfolio");
      sessionStorage.redirect = "/" + pathSegments.slice(1).join("/") + location.search;
    </script>
    <meta http-equiv="refresh" content="0;url=/Payalgoel-portfolio/" />
  </head>
</html>
